name: Dependabot auto-merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor/patch and build-system updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.package-ecosystem == 'github_actions' ||
          steps.meta.outputs.package-ecosystem == 'docker'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          # GITHUB_TOKEN cannot merge PRs that touch .github/workflows/** — it
          # lacks the `workflows` scope. Set WORKFLOW_TOKEN to a fine-grained
          # PAT with "Contents: Write" + "Workflows: Write" on this repo to
          # enable auto-merge for workflow-file bumps. Without it, those PRs
          # require a manual merge — they will not auto-merge.
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN != '' && secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
